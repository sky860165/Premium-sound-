name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip project
        run: unzip PremiumSounds_v3_0_DSP.zip

      - name: Build APK
        run: |
          chmod +x premiumsounds/gradlew
          cd premiumsounds
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PremiumSounds-APK
          path: premiumsounds/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
