name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unzip project
        run: |
          unzip PremiumSounds_v3_0_DSP_fixed.zip
          ls -la

      - name: Create gradle.properties
        run: |
          cd premiumsounds
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2560m -XX:MaxMetaspaceSize=768m" >> gradle.properties

      - name: Build Debug APK
        run: |
          cd premiumsounds
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PremiumSounds-APK
          path: "**/outputs/apk/debug/app-debug.apk"
          retention-days: 7
